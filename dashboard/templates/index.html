<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Support Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e2e8f0;
    --muted: #8892a4;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --blue: #3b82f6;
    --purple: #a855f7;
    --accent: #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

  /* Header */
  .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 18px; font-weight: 700; color: var(--blue); }
  .header .meta { color: var(--muted); font-size: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* Layout */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
  .col-wide { grid-column: span 2; }
  @media(max-width:700px){ .col-wide { grid-column: span 1; } }

  /* Cards */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
  .card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .card-title .icon { font-size: 14px; }

  /* Stat row */
  .stat-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--muted); }
  .stat-val { font-weight: 600; font-size: 15px; }

  /* Gauge bars */
  .gauge-wrap { margin-bottom: 12px; }
  .gauge-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
  .gauge-track { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .gauge-fill { height: 100%; border-radius: 99px; transition: width .6s ease; }
  .gauge-ok   { background: var(--green); }
  .gauge-warn { background: var(--yellow); }
  .gauge-crit { background: var(--red); }

  /* Alerts */
  .alert { padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; font-size: 13px; display: flex; align-items: flex-start; gap: 8px; }
  .alert-ok   { background: #14532d22; border: 1px solid #16a34a44; color: var(--green); }
  .alert-warn { background: #78350f22; border: 1px solid #d9770644; color: var(--yellow); }
  .alert-crit { background: #7f1d1d22; border: 1px solid #dc262644; color: var(--red); }
  .alert-info { background: #1e3a5f22; border: 1px solid #3b82f644; color: var(--blue); }

  /* Process table */
  .proc-table { width: 100%; border-collapse: collapse; }
  .proc-table th { color: var(--muted); font-size: 11px; font-weight: 600; text-align: left; padding: 4px 6px; text-transform: uppercase; }
  .proc-table td { padding: 5px 6px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .proc-table tr:last-child td { border-bottom: none; }
  .proc-name { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .badge-ok   { background: #14532d33; color: var(--green); }
  .badge-warn { background: #78350f33; color: var(--yellow); }
  .badge-crit { background: #7f1d1d33; color: var(--red); }

  /* Network */
  .conn-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .conn-row:last-child { border-bottom: none; }
  .conn-process { color: var(--blue); font-weight: 600; }
  .conn-addr { color: var(--muted); font-family: monospace; }

  /* Quick action buttons */
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn { padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--border); color: var(--text); cursor: pointer; font-size: 13px; font-weight: 500; transition: all .2s; text-align: center; }
  .btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-result { margin-top: 10px; font-size: 12px; padding: 8px 10px; border-radius: 6px; display: none; }

  /* Disk */
  .disk-item { margin-bottom: 14px; }
  .disk-item:last-child { margin-bottom: 0; }

  /* Security */
  .sec-summary { font-size: 15px; font-weight: 600; margin-bottom: 12px; }

  /* Spinner */
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Loading skeleton */
  .skeleton { background: linear-gradient(90deg, var(--border) 25%, #2f3347 50%, var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; height: 14px; margin-bottom: 8px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .tag-ok   { color: var(--green); }
  .tag-warn { color: var(--yellow); }
  .tag-crit { color: var(--red); }
  .tag-info { color: var(--blue); }
  .tag-muted { color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <h1>🖥️ IT Support Dashboard</h1>
  <div class="meta">
    <span class="status-dot"></span>
    <span id="last-updated">Loading…</span>
  </div>
</div>

<div class="grid" id="main-grid">

  <!-- System Health -->
  <div class="card" id="card-system">
    <div class="card-title"><span class="icon">💻</span> System Health</div>
    <div id="system-content"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>
  </div>

  <!-- CPU / RAM Gauges -->
  <div class="card" id="card-gauges">
    <div class="card-title"><span class="icon">📊</span> Resource Usage</div>
    <div id="gauges-content"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>
  </div>

  <!-- Battery & Uptime -->
  <div class="card" id="card-misc">
    <div class="card-title"><span class="icon">🔋</span> Battery & Uptime</div>
    <div id="misc-content"><div class="skeleton"></div><div class="skeleton"></div></div>
  </div>

  <!-- Alerts -->
  <div class="card" id="card-alerts">
    <div class="card-title"><span class="icon">🚨</span> Alerts</div>
    <div id="alerts-content"><div class="skeleton"></div></div>
  </div>

  <!-- Storage -->
  <div class="card" id="card-storage">
    <div class="card-title"><span class="icon">💾</span> Storage</div>
    <div id="storage-content"><div class="skeleton"></div><div class="skeleton"></div></div>
  </div>

  <!-- Security -->
  <div class="card" id="card-security">
    <div class="card-title"><span class="icon">🛡️</span> Security</div>
    <div id="security-content"><div class="skeleton"></div></div>
  </div>

  <!-- Network -->
  <div class="card col-wide" id="card-network">
    <div class="card-title"><span class="icon">🌐</span> Network Connections</div>
    <div id="network-content"><div class="skeleton"></div><div class="skeleton"></div></div>
  </div>

  <!-- Top Processes -->
  <div class="card col-wide" id="card-processes">
    <div class="card-title"><span class="icon">⚙️</span> Top Processes</div>
    <div id="processes-content"><div class="skeleton"></div><div class="skeleton"></div></div>
  </div>

  <!-- Quick Actions -->
  <div class="card" id="card-actions">
    <div class="card-title"><span class="icon">🔧</span> Quick Actions</div>
    <div class="btn-grid">
      <button class="btn" onclick="runFix('clear_temp')">🗑️ Clear Temp Files</button>
      <button class="btn" onclick="runFix('clear_cache')">🧹 Clear Cache</button>
      <button class="btn" onclick="runFix('fix_permissions')">🔑 Fix Permissions</button>
      <button class="btn" onclick="runFix('free_memory')">🧠 Free Memory</button>
    </div>
    <div class="btn-result alert" id="fix-result"></div>
  </div>

</div>

<script>
// ── Helpers ───────────────────────────────────────────────────────────────────
function gauge(label, pct, unit) {
  const cls = pct > 90 ? 'crit' : pct > 75 ? 'warn' : 'ok';
  const tag  = pct > 90 ? 'tag-crit' : pct > 75 ? 'tag-warn' : 'tag-ok';
  return `<div class="gauge-wrap">
    <div class="gauge-header"><span>${label}</span><span class="${tag}">${pct}${unit}</span></div>
    <div class="gauge-track"><div class="gauge-fill gauge-${cls}" style="width:${Math.min(pct,100)}%"></div></div>
  </div>`;
}

function badge(val, warn, crit) {
  const cls = val >= crit ? 'crit' : val >= warn ? 'warn' : 'ok';
  return `<span class="badge badge-${cls}">${val}%</span>`;
}

function statRow(label, val) {
  return `<div class="stat-row"><span class="stat-label">${label}</span><span class="stat-val">${val}</span></div>`;
}

// ── Render functions ──────────────────────────────────────────────────────────
function renderSystem(d) {
  if (d.error) return `<div class="alert alert-warn">⚠️ ${d.error}</div>`;
  return `
    ${statRow('OS', `${d.os} ${d.os_release}`)}
    ${statRow('Hostname', d.hostname || '—')}
    ${statRow('CPU Cores', `${d.cpu_count_physical || '?'} physical / ${d.cpu_count_logical || '?'} logical`)}
    ${statRow('RAM', `${d.ram_used_gb} GB / ${d.ram_total_gb} GB`)}
    ${statRow('Python', d.python_version || '—')}
  `;
}

function renderGauges(d) {
  if (d.error) return `<div class="alert alert-warn">⚠️ ${d.error}</div>`;
  let html = gauge('CPU', d.cpu_usage_avg || 0, '%')
           + gauge('RAM', d.ram_percent || 0, '%')
           + gauge('Swap', d.swap_percent || 0, '%');
  (d.disks || []).forEach(dk => {
    html += gauge(`Disk ${dk.mountpoint}`, dk.percent, '%');
  });
  return html;
}

function renderMisc(d) {
  if (d.error) return `<div class="alert alert-warn">⚠️ ${d.error}</div>`;
  let html = statRow('Uptime', d.uptime || '—')
           + statRow('Boot time', d.boot_time || '—');
  if (d.battery) {
    const b = d.battery;
    const icon = b.plugged_in ? '🔌' : '🔋';
    const cls  = (!b.plugged_in && b.percent < 20) ? 'tag-crit' : (!b.plugged_in && b.percent < 40) ? 'tag-warn' : 'tag-ok';
    html += statRow('Battery', `<span class="${cls}">${icon} ${b.percent}% — ${b.time_remaining}</span>`);
  } else {
    html += statRow('Battery', '<span class="tag-muted">No battery info</span>');
  }
  return html;
}

function renderAlerts(d) {
  const alerts = d.alerts || [];
  if (!alerts.length) return `<div class="alert alert-ok">✅ No alerts — system looks healthy</div>`;
  return alerts.map(a => {
    const cls = a.includes('❌') ? 'alert-crit' : a.includes('⚠️') ? 'alert-warn' : 'alert-info';
    return `<div class="alert ${cls}">${a}</div>`;
  }).join('');
}

function renderStorage(d) {
  if (d.error) return `<div class="alert alert-warn">⚠️ ${d.error}</div>`;
  let html = (d.partitions || []).map(p => `
    <div class="disk-item">
      <div class="gauge-header">
        <span>💿 ${p.device} <span class="tag-muted">(${p.mountpoint})</span></span>
        <span class="${p.percent_used>90?'tag-crit':p.percent_used>80?'tag-warn':'tag-ok'}">${p.percent_used}%</span>
      </div>
      <div class="gauge-track"><div class="gauge-fill ${p.percent_used>90?'gauge-crit':p.percent_used>80?'gauge-warn':'gauge-ok'}" style="width:${p.percent_used}%"></div></div>
      <div style="font-size:11px;color:var(--muted);margin-top:3px">${p.used_gb} GB used / ${p.total_gb} GB total — ${p.free_gb} GB free</div>
    </div>`).join('');

  if (d.temp_sizes) {
    html += `<div style="margin-top:12px">`;
    Object.entries(d.temp_sizes).forEach(([k, v]) => {
      html += `<div class="stat-row"><span class="stat-label">${k.replace(/_/g,' ')}</span><span class="stat-val tag-muted">${v.size}</span></div>`;
    });
    html += `</div>`;
  }
  return html || `<div class="alert alert-info">No disk data</div>`;
}

function renderSecurity(d) {
  if (d.error) return `<div class="alert alert-warn">⚠️ ${d.error}</div>`;
  const isSafe = !d.suspicious_processes?.length && !d.host_file_anomalies?.length && !d.warnings?.filter(w=>w.severity==='high').length;
  let html = `<div class="sec-summary ${isSafe?'tag-ok':'tag-warn'}">${d.summary || (isSafe ? '✅ Clean' : '⚠️ Issues found')}</div>`;

  if (d.suspicious_processes?.length) {
    html += `<div class="alert alert-crit">❌ ${d.suspicious_processes.length} suspicious process(es) found</div>`;
    d.suspicious_processes.forEach(p => {
      html += `<div class="alert alert-warn" style="font-size:12px">⚠️ PID ${p.pid}: <b>${p.name}</b> — ${p.reason}</div>`;
    });
  }

  (d.warnings || []).forEach(w => {
    const cls = w.severity === 'high' ? 'alert-crit' : 'alert-info';
    html += `<div class="alert ${cls}" style="font-size:12px">🔍 ${w.detail}</div>`;
  });

  html += statRow('Open ports', d.open_ports?.length || 0);
  html += statRow('Cron jobs', d.cron_jobs?.length || 0);
  return html;
}

function renderNetwork(d) {
  if (d.error) return `<div class="alert alert-warn">⚠️ ${d.error}</div>`;

  let html = '';
  if (d.suspicious_connections?.length) {
    html += `<div class="alert alert-crit" style="margin-bottom:12px">❌ ${d.suspicious_connections.length} suspicious connection(s) detected!</div>`;
  }

  const conns = d.established_connections || [];
  if (!conns.length) { html += `<div class="alert alert-ok">✅ No active outbound connections</div>`; }
  else {
    html += `<div style="margin-bottom:8px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.6px">${conns.length} established connections</div>`;
    conns.slice(0, 12).forEach(c => {
      html += `<div class="conn-row">
        <span class="conn-process">${c.process || 'unknown'}</span>
        <span class="conn-addr">${c.local || ''} → ${c.remote || ''}</span>
        <span class="tag-muted">${c.status}</span>
      </div>`;
    });
  }

  if (d.dns_servers?.length) {
    html += `<div style="margin-top:10px">${statRow('DNS servers', d.dns_servers.join(' / '))}</div>`;
  }
  return html;
}

function renderProcesses(d) {
  if (d.error) return `<div class="alert alert-warn">⚠️ ${d.error}</div>`;
  const procs = d.top_processes || [];
  if (!procs.length) return `<div class="alert alert-info">No process data</div>`;

  let rows = procs.map(p => {
    const cpuCls = p.cpu_percent > 50 ? 'crit' : p.cpu_percent > 20 ? 'warn' : 'ok';
    const memCls = p.mem_percent > 10 ? 'warn' : 'ok';
    return `<tr>
      <td><span class="proc-name" title="${p.cmdline}">${p.name}</span></td>
      <td><span class="badge badge-${cpuCls}">${p.cpu_percent.toFixed(1)}%</span></td>
      <td><span class="badge badge-${memCls}">${p.mem_percent.toFixed(1)}%</span></td>
      <td class="tag-muted">${p.user || ''}</td>
      <td class="tag-muted">${p.pid}</td>
    </tr>`;
  }).join('');

  return `<table class="proc-table">
    <thead><tr><th>Process</th><th>CPU</th><th>Memory</th><th>User</th><th>PID</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── Data fetching ─────────────────────────────────────────────────────────────
async function fetchAll() {
  try {
    const res = await fetch('/api/all');
    const data = await res.json();

    document.getElementById('system-content').innerHTML  = renderSystem(data.system || {});
    document.getElementById('gauges-content').innerHTML  = renderGauges(data.system || {});
    document.getElementById('misc-content').innerHTML    = renderMisc(data.system || {});
    document.getElementById('alerts-content').innerHTML  = renderAlerts(data.system || {});
    document.getElementById('storage-content').innerHTML = renderStorage(data.storage || {});
    document.getElementById('network-content').innerHTML = renderNetwork(data.network || {});
    document.getElementById('processes-content').innerHTML = renderProcesses(data.processes || {});
    document.getElementById('last-updated').textContent  = `Last updated: ${data.last_updated}`;
  } catch(e) {
    console.error('Fetch error:', e);
  }
}

async function fetchSecurity() {
  try {
    const res = await fetch('/api/security');
    const data = await res.json();
    document.getElementById('security-content').innerHTML = renderSecurity(data);
  } catch(e) {}
}

async function runFix(fixType) {
  const btn = event.target;
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span> Running…`;
  const result = document.getElementById('fix-result');
  result.style.display = 'none';

  try {
    const res = await fetch(`/api/fix/${fixType}`, { method: 'POST' });
    const data = await res.json();
    result.style.display = 'block';
    if (data.success) {
      result.className = 'btn-result alert alert-ok';
      result.innerHTML = `✅ Done! ${data.freed_mb ? 'Freed ' + data.freed_mb + ' MB.' : ''} ${data.note || ''}`;
      fetchAll(); // refresh storage
    } else {
      result.className = 'btn-result alert alert-warn';
      result.innerHTML = `⚠️ ${data.error || data.note || 'Could not complete fix'}`;
    }
  } catch(e) {
    result.style.display = 'block';
    result.className = 'btn-result alert alert-crit';
    result.innerHTML = `❌ Request failed`;
  }

  btn.disabled = false;
  btn.innerHTML = btn.innerHTML.replace('<span class="spinner"></span> Running…', btn.textContent);
  setTimeout(() => { result.style.display = 'none'; }, 6000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
fetchAll();
fetchSecurity();
setInterval(fetchAll, 10000);       // refresh main data every 10s
setInterval(fetchSecurity, 120000); // refresh security every 2 min
</script>
</body>
</html>
